# =============================================================================
#  ReportFactory Lite  -  Configuration
# =============================================================================
#  This file overrides the defaults packaged inside the application.
#  All product properties use the "maathra.rfl" namespace (rfl = ReportFactory Lite).
#
#  The download is a self-contained folder (this file lives in its config/). Start it
#  from that folder with:
#      ./run.sh            (run.bat on Windows)
#  run.sh sets the engine root to the bundle folder and loads this file automatically.
# =============================================================================

# -----------------------------------------------------------------------------
#  Server
# -----------------------------------------------------------------------------
# HTTP port. Ports below 1024 (e.g. 80) require root/sudo on Linux/Mac.
server.port=8080


# -----------------------------------------------------------------------------
#  Security
# -----------------------------------------------------------------------------
# API key clients must send in the "X-API-KEY" request header.
# >>> CHANGE THIS before exposing the service. <<<
maathra.rfl.api-key=key


# -----------------------------------------------------------------------------
#  Licensing
# -----------------------------------------------------------------------------
# Empty = Trial mode (report generation capped at 15/hour - a fixed limit).
# To unlock unlimited generation:
#   call GET /unique-key, send the shown id to sales@maathra.com for a licence key,
#   paste it below, and restart.
maathra.rfl.license-key=


# -----------------------------------------------------------------------------
#  Report engine root  (holds templates/, reports/, logs/, lib/)
#  run.sh / run.bat set this automatically to the bundle folder, so it normally
#  needs no value here. Uncomment to force a specific absolute path (e.g. to keep
#  data on another volume). No trailing separator.
# -----------------------------------------------------------------------------
# maathra.rfl.root=/opt/report-engine

# Keep generated files after returning them? false = delete after returning (default),
# true = keep every file on disk (you must purge the folder yourself).
maathra.rfl.report.persist-output=false


# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
# Days of daily-rolled logs to keep; older logs are deleted automatically.
maathra.rfl.log.retention-days=30


# -----------------------------------------------------------------------------
#  Payload encryption (AES-256-CBC)
# -----------------------------------------------------------------------------
# 0 = disabled (plain JSON body) ,  1 = enabled (encrypted body)
maathra.rfl.aes.enabled=0
# 64 hex chars = 32-byte (256-bit) key.  >>> CHANGE THIS if you enable encryption. <<<
maathra.rfl.aes.encryption-key=A3F67C9D8E0B2451F68C3E91D6B7A2F549E80DCCB6F1E392A3D5C7F8421B6D3E
# 32 hex chars = 16-byte initialization vector.  >>> CHANGE THIS if you enable encryption. <<<
maathra.rfl.aes.encryption-iv=F1B27498D2E3A6C75089F4BA3D65C2E7


# -----------------------------------------------------------------------------
#  File console  (web UI for managing template / asset / report / log / lib files)
#  ENABLED out of the box for easy onboarding, so it is reachable as soon as you
#  deploy. The api key is SERVER-ADMIN-EQUIVALENT (uploaded .jrxml/.jasper/.jar
#  files execute code on this server). Before real use you MUST:
#     1. change auth-key and api-key below (the defaults are publicly documented),
#     2. optionally restrict allowed-ips to your admin address(es),
#     3. run the service behind HTTPS.
# -----------------------------------------------------------------------------
maathra.rfl.console.enabled=true
maathra.rfl.console.base-path=/console
# IP allow-list (CIDR supported, comma-separated). Restriction is OPT-IN:
#   EMPTY  => any IP may reach the console (still gated by the keys below).
#   set    => only the listed IPs/CIDRs may reach it (e.g. 203.0.113.5/32,10.0.0.0/8).
# Loopback-only example: 127.0.0.1/32,::1/128
maathra.rfl.console.allowed-ips=
# Trust X-Forwarded-For only from these proxy IPs. Empty => ignore XFF (use socket IP).
maathra.rfl.console.trusted-proxies=
# Console keys (plaintext). auth-key unlocks the UI; api-key authorises file ops.
# >>> DEFAULT KEYS - change them before widening allowed-ips. <<<
maathra.rfl.console.auth-key=rfl-console-auth
maathra.rfl.console.api-key=rfl-console-api
# Per-area upload capability + allowed extensions.
maathra.rfl.console.templates.upload=true
maathra.rfl.console.templates.allowed-ext=jrxml,jasper
maathra.rfl.console.assets.upload=true
maathra.rfl.console.assets.allowed-ext=png,jpg,jpeg,gif,svg,bmp
maathra.rfl.console.reports.upload=false
maathra.rfl.console.logs.upload=false
# Extra jars (QR/barcode, custom fonts, JasperReports extensions). Loaded on the next
# restart. Uploading a jar runs its code on this server - treat as admin-level.
maathra.rfl.console.lib.upload=true
maathra.rfl.console.lib.allowed-ext=jar
# Limits & behaviour.
maathra.rfl.console.max-file-size-mb=10
maathra.rfl.console.delete-enabled=true
maathra.rfl.console.overwrite-backup=true
# Allow restart from the console (works because we launch via run.sh, which relaunches
# on exit code 86). Set to false when deploying the WAR into Tomcat.
maathra.rfl.console.restart-enabled=true
